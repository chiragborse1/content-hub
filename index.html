<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <!-- Apply saved theme before React mounts to prevent flash -->
  <script>
    (function () {
      var t = localStorage.getItem("theme");
      if (t === "light") { document.documentElement.classList.remove("dark"); }
      else { document.documentElement.classList.add("dark"); }
    })();
  </script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Hub</title>
  <meta name="description" content="Private creator inspiration dashboard" />
  <meta name="author" content="sci.artistry" />

  <meta property="og:title" content="Content Hub" />
  <meta property="og:description" content="Private creator inspiration dashboard" />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
